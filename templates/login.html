<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - OJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 40px; width: 380px; max-width: 90vw;
  }
  .card h1 { text-align: center; font-size: 22px; margin-bottom: 8px; color: #2c3e50; }
  .card .sub { text-align: center; font-size: 13px; color: #888; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: #2c3e50; }
  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    font-size: 15px; font-weight: 500; cursor: pointer; background: #2c3e50; color: #fff;
    transition: background .15s;
  }
  .btn:hover { background: #1a252f; }
  .error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
  .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
  .link a { color: #3498db; text-decoration: none; }
  .link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <h1>📖 OJ 登录</h1>
  <p class="sub">校赛评测系统</p>
  <div class="field">
    <label>学号</label>
    <input id="student_id" placeholder="输入学号" autocomplete="username">
  </div>
  <div class="field">
    <label>密码</label>
    <input id="password" type="password" placeholder="输入密码" autocomplete="current-password">
  </div>
  <button class="btn" onclick="login()">登录</button>
  <div id="error" class="error"></div>
  <div class="link">
    还没有账号？<a href="/register">立即注册</a>
  </div>
</div>
<script>
function login() {
  const sid = document.getElementById("student_id").value.trim();
  const pw = document.getElementById("password").value;
  const err = document.getElementById("error");
  const btn = document.querySelector(".btn");
  if (!sid || !pw) { err.textContent = "请填写学号和密码"; return; }
  btn.disabled = true; btn.textContent = "登录中...";
  fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ student_id: sid, password: pw }),
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) { err.textContent = d.error; btn.disabled = false; btn.textContent = "登录"; return; }
      window.location.href = "/";
    })
    .catch(() => { err.textContent = "网络错误"; btn.disabled = false; btn.textContent = "登录"; });
}
document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
