<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题目列表 - OJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #f5f5f5; color: #333; min-height: 100vh;
  }
  nav {
    background: #2c3e50; color: #fff; padding: 0 24px;
    display: flex; align-items: center; height: 52px; gap: 20px;
  }
  nav .brand { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; text-decoration: none; color: #fff; }
  nav a:not(.brand) { color: #bdc3c7; text-decoration: none; font-size: 14px; }
  nav a:hover { color: #fff; }
  nav .right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  nav .right span { font-size: 13px; color: #95a5a6; }
  nav .right .name { color: #ecf0f1; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .panel {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 24px;
  }
  .panel h2 { font-size: 18px; margin-bottom: 16px; color: #2c3e50; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; background: #f8f9fa; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #555; }
  td { padding: 12px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f8f9fa; }
  .prob-id { color: #888; font-size: 13px; }
  .prob-title { color: #2c3e50; font-weight: 500; text-decoration: none; }
  .prob-title:hover { color: #3498db; }
  .btn-logout {
    background: none; border: 1px solid #7f8c8d; color: #bdc3c7;
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .btn-logout:hover { border-color: #e74c3c; color: #e74c3c; }
  .admin-badge {
    background: #e74c3c; color: #fff; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; text-decoration: none; font-weight: 500;
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="brand">📖 OJ</a>
  <a href="/rank">排行榜</a>
  <div class="right">
    <span id="nav-user"></span>
    <span id="nav-admin-link"></span>
    <button class="btn-logout" id="btn-logout" style="display:none" onclick="logout()">退出</button>
  </div>
</nav>
<div class="container">
  <div class="panel">
    <h2>📋 题目列表</h2>
    <table>
      <thead><tr><th style="width:80px">#</th><th>题目名称</th></tr></thead>
      <tbody>
        {% for p in problems %}
        <tr>
          <td class="prob-id">{{ p.id }}</td>
          <td><a class="prob-title" href="/problem/{{ p.id }}">{{ p.title }}</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
<script>
function logout() {
  fetch("/api/logout", { method: "POST" })
    .then(() => { window.location.href = "/login"; });
}
function loadUser() {
  fetch("/api/me")
    .then(r => r.json())
    .then(d => {
      const nav = document.getElementById("nav-user");
      const logoutBtn = document.getElementById("btn-logout");
      const adminLink = document.getElementById("nav-admin-link");
      if (d.user) {
        nav.innerHTML = '<span class="name">' + d.user.name + '</span>';
        logoutBtn.style.display = "";
        if (d.user.is_admin) {
          adminLink.innerHTML = '<a href="/admin" class="admin-badge">管理</a>';
        }
      } else {
        nav.innerHTML = '<a href="/login">登录</a>';
        logoutBtn.style.display = "none";
      }
    });
}
loadUser();
</script>
</body>
</html>
