<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Judge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #f5f5f5; color: #333; min-height: 100vh;
  }
  header {
    background: #2c3e50; color: #fff; padding: 16px 24px;
    font-size: 20px; font-weight: 700; letter-spacing: 0.5px;
  }
  .container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 16px; height: fit-content;
  }
  .sidebar h3 { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .sidebar ul { list-style: none; }
  .sidebar li {
    padding: 8px 12px; cursor: pointer; border-radius: 6px;
    font-size: 14px; transition: background 0.15s;
  }
  .sidebar li:hover { background: #eef2f7; }
  .sidebar li.active { background: #2c3e50; color: #fff; }
  .main {
    flex: 1; display: flex; flex-direction: column; gap: 16px;
  }
  .panel {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 20px;
  }
  .panel-title {
    font-size: 15px; font-weight: 600; color: #555;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }
  #problem-desc { white-space: pre-wrap; font-size: 14px; line-height: 1.7; }
  #problem-desc:empty::after { content: "请从左侧选择一个题目"; color: #aaa; }
  textarea {
    width: 100%; min-height: 260px; font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    font-size: 13px; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
    resize: vertical; line-height: 1.5; tab-size: 4;
  }
  textarea:focus { outline: none; border-color: #2c3e50; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.15s;
  }
  .btn-primary { background: #2c3e50; color: #fff; }
  .btn-primary:hover { background: #1a252f; }
  .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; }
  .btn-secondary { background: #ecf0f1; color: #333; }
  .btn-secondary:hover { background: #d5dbdb; }
  #status {
    margin-left: auto; font-size: 13px; color: #888;
  }
  #status.loading { color: #e67e22; }
  #status.accepted { color: #27ae60; font-weight: 600; }
  #status.wrong { color: #e74c3c; font-weight: 600; }
  #status.error { color: #e74c3c; }

  .results-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .results-table th {
    text-align: left; padding: 8px 10px; background: #f8f9fa;
    border-bottom: 2px solid #dee2e6; font-weight: 600;
  }
  .results-table td {
    padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top;
  }
  .results-table .pass { color: #27ae60; font-weight: 600; }
  .results-table .fail { color: #e74c3c; font-weight: 600; }
  .diff { background: #fff0f0; }
  .sample-link {
    color: #3498db; cursor: pointer; text-decoration: underline;
  }
  .sample-link:hover { color: #2980b9; }
</style>
</head>
<body>
<header>📖 Online Judge</header>
<div class="container">
  <div class="sidebar">
    <h3>题目列表</h3>
    <ul id="problem-list">
      {% for p in problems %}
      <li data-pid="{{ p.id }}" onclick="selectProblem('{{ p.id }}', this)">{{ p.title }}</li>
      {% endfor %}
    </ul>
  </div>
  <div class="main">
    <div class="panel">
      <div class="panel-title">题目描述</div>
      <pre id="problem-desc"></pre>
    </div>
    <div class="panel">
      <div class="panel-title">提交代码</div>
      <textarea id="code" placeholder='print(sum(map(int, input().split())))'></textarea>
      <div class="toolbar" style="margin-top:12px">
        <select id="lang-select" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:#fff">
          <option value="py">Python</option>
          <option value="cpp">C++ (C++17)</option>
          <option value="java">Java 17</option>
        </select>
        <button class="btn btn-primary" id="submit-btn" onclick="submitCode()">提交评测</button>
        <button class="btn btn-secondary" onclick="document.getElementById('code').value=''">清空</button>
        <span id="status"></span>
      </div>
    </div>
    <div class="panel" id="result-panel" style="display:none">
      <div class="panel-title">评测结果</div>
      <table class="results-table">
        <thead><tr><th>测试点</th><th>输入</th><th>期望输出</th><th>实际输出</th><th>结果</th></tr></thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
let currentPid = null;

// Load problems on page load
window.addEventListener("DOMContentLoaded", () => {
  const list = document.getElementById("problem-list");
  if (list && list.children.length > 0) {
    selectProblem(list.children[0].dataset.pid, list.children[0]);
  }
});

function selectProblem(pid, el) {
  currentPid = pid;
  document.querySelectorAll("#problem-list li").forEach(
    li => li.classList.remove("active")
  );
  if (el) el.classList.add("active");
  document.getElementById("problem-desc").textContent = "加载中...";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("status").textContent = "";

  fetch("/api/problem/" + pid)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById("problem-desc").textContent = data.error;
      } else {
        document.getElementById("problem-desc").textContent = data.desc;
      }
    })
    .catch(() => {
      document.getElementById("problem-desc").textContent = "加载失败";
    });
}

function submitCode() {
  const code = document.getElementById("code").value.trim();
  if (!currentPid) { alert("请先选择一个题目"); return; }
  if (!code) { alert("请先输入代码"); return; }

  const btn = document.getElementById("submit-btn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.className = "loading";
  status.textContent = "评测中...";

  fetch("/api/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      pid: currentPid,
      code,
      lang: document.getElementById("lang-select").value,
    }),
  })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      if (data.error) {
        status.className = "error";
        status.textContent = data.error;
        return;
      }

      if (data.verdict === "Accepted") {
        status.className = "accepted";
        status.textContent = "✓ Accepted";
      } else if (data.verdict === "Wrong Answer") {
        status.className = "wrong";
        status.textContent = "✗ Wrong Answer";
      } else if (data.verdict === "Compilation Error") {
        status.className = "error";
        status.textContent = "⚠ Compilation Error";
      } else {
        status.className = "error";
        status.textContent = data.verdict;
      }

      // Show detailed results
      const panel = document.getElementById("result-panel");
      const tbody = document.getElementById("results-body");
      tbody.innerHTML = "";
      if (data.results) {
        data.results.forEach(r => {
          const tr = document.createElement("tr");
          if (!r.passed) tr.className = "diff";
          tr.innerHTML =
            `<td>#${r.idx}</td>` +
            `<td><code>${escapeHtml(r.input)}</code></td>` +
            `<td><code>${escapeHtml(r.expected)}</code></td>` +
            `<td><code>${escapeHtml(r.actual)}</code></td>` +
            `<td class="${r.passed ? 'pass' : 'fail'}">${r.passed ? '✓' : '✗'}</td>`;
          tbody.appendChild(tr);
        });
        panel.style.display = "";
      }
    })
    .catch(err => {
      btn.disabled = false;
      status.className = "error";
      status.textContent = "提交失败: " + err.message;
    });
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

</script>
</body>
</html>
